<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epub Reader</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button id="btnOpen" class="button-17" title="Open EPUB">📂 Open</button>
      <button id="btnToc" class="button-17" title="Table of Contents">📑 TOC</button>
      <button id="btnPrev" class="button-17" title="Previous Page">◀ Prev</button>
      <button id="btnNext" class="button-17" title="Next Page">Next ▶</button>
      <button id="btnZoomIn" class="button-17" title="Zoom In">🔍+</button>
      <button id="btnZoomOut" class="button-17" title="Zoom Out">🔍-</button>
      <button id="btnTheme" class="button-17" title="Toggle Theme">🌙</button>
      <button id="btnFontSize" class="button-17" title="Font Size">🔤 <span id="fontSizeValueDisplay">16px</span></button>
      <button id="btnPageInfo" class="button-17" style="cursor: default;" title="Page Info"><span id="pageInfo">N/N</span></button>
      <button id="btnSettings" class="button-17" title="Settings" style="margin-left: auto;">⚙️</button>
    </div>

    <!-- Main Container for Sidebar and Content -->
    <div class="main-container" id="mainContainer">
      <!-- Sidebar for TOC -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3 id="tocTitle">Table of Contents</h3>
        </div>
        <div class="toc-content" id="tocContent"></div>
      </div>

      <!-- Main Content Area -->
      <div class="content-area" id="contentArea">
        <div class="welcome-message" id="welcomeMessage">
          <h1>Welcome to Epub Reader for Edge</h1>
          <p>Click "Open" to load an EPUB file, or drag and drop an EPUB file here.</p>
        </div>
        <iframe id="viewerFrame" sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-popups allow-top-navigation-by-user-activation" style="pointer-events: none;"></iframe>
      </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".epub" style="display: none;">
    
    <!-- Drag and Drop Overlay -->
    <div class="drag-overlay" id="dragOverlay">Drop EPUB file here</div>
    
    <!-- Settings Modal - Moved outside #app to avoid z-index issues -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="settingsTitle">Settings</h3>
          <button id="btnCloseSettings" class="close-btn">✕</button>
        </div>
        <div class="modal-content">
          <div class="setting-item">
            <label id="tocFontSizeLabel" for="tocFontSizeSlider">TOC Font Size:</label>
            <input type="range" id="tocFontSizeSlider" min="12" max="24" value="14">
            <span id="tocFontSizeValue">14px</span>
          </div>
          <div class="setting-item">
            <label id="fontSizeLabel" for="mainFontSizeSlider">Font Size:</label>
            <input type="range" id="mainFontSizeSlider" min="12" max="32" value="16">
            <span id="mainFontSizeValue">16px</span>
          </div>
          <div class="setting-item">
            <label id="languageLabel">Language:</label>
            <button id="btnToggleLanguage">中文 / English</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Font Size Modal - Moved outside #app to avoid z-index issues -->
    <div class="modal-overlay" id="fontSizeModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="fontSizeModalTitle">Font Size</h3>
          <button id="btnCloseFontSize" class="close-btn">✕</button>
        </div>
        <div class="modal-content">
          <div class="setting-item" style="justify-content: center;">
            <input type="range" id="fontSizeSlider" min="12" max="32" value="16" style="width: 200px;">
            <span id="fontSizeValue">16px</span>
          </div>
        </div>
      </div>
    </div>

  <!-- Libraries -->
  <script src="../lib/jszip.min.js"></script>
  <script src="reader.js"></script>
</body>
</html>
