<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citron Reader</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <button id="btnOpen" class="button-17" title="Open EPUB">📂 Open</button>
      <button id="btnToc" class="button-17" title="Table of Contents">📑 TOC</button>
      <button id="btnPrev" class="button-17" title="Previous Page">◀ Prev</button>
      <button id="btnNext" class="button-17" title="Next Page">Next ▶</button>
      <button id="btnZoomIn" class="button-17" title="Zoom In">🔍+</button>
      <button id="btnZoomOut" class="button-17" title="Zoom Out">🔍-</button>
      <button id="btnTheme" class="button-17" title="Toggle Theme">🌙</button>
      <button id="btnFontSize" class="button-17" title="Font Size">🔤 <span id="fontSizeValueDisplay">16px</span></button>
      
      <!-- Right side: Page Info and Settings -->
      <div style="margin-left: auto; display: flex; align-items: center; gap: 6px;">
        <button id="btnPageInfo" class="button-17" style="cursor: default;" title="Page Info"><span id="pageInfo">N/N</span></button>
        <div class="dropdown-container" style="position: relative; display: inline-block;">
          <button id="btnSettings" class="button-17" title="Settings">⚙️</button>
          <!-- Settings Dropdown Panel -->
          <div class="settings-dropdown" id="settingsDropdown">
            <div class="setting-item">
              <label id="tocFontSizeLabel" for="tocFontSizeSliderDropdown">TOC Font Size:</label>
              <input type="range" id="tocFontSizeSliderDropdown" min="12" max="24" value="14">
              <span id="tocFontSizeValueDropdown">14px</span>
            </div>
            <div class="setting-item">
              <label id="fontSizeLabel" for="mainFontSizeSliderDropdown">Font Size:</label>
              <input type="range" id="mainFontSizeSliderDropdown" min="12" max="32" value="16">
              <span id="mainFontSizeValueDropdown">16px</span>
            </div>
            <div class="setting-item">
              <label id="languageLabel">Language:</label>
              <button id="btnToggleLanguageDropdown">中文 / English</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Container for Sidebar and Content -->
    <div class="main-container" id="mainContainer">
      <!-- Sidebar for TOC -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3 id="tocTitle">Table of Contents</h3>
        </div>
        <div class="toc-content" id="tocContent"></div>
      </div>

      <!-- Main Content Area -->
      <div class="content-area" id="contentArea">
        <div class="welcome-message" id="welcomeMessage">
          <h1>Welcome to Citron Reader</h1>
          <p>Click "Open" to load an EPUB file, or drag and drop an EPUB file here.</p>
        </div>
        <iframe id="viewerFrame" sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-popups allow-top-navigation-by-user-activation" style="pointer-events: none;"></iframe>
      </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".epub" style="display: none;">
    
    <!-- Drag and Drop Overlay -->
    <div class="drag-overlay" id="dragOverlay">Drop EPUB file here</div>

  <!-- Libraries -->
  <script src="../lib/jszip.min.js"></script>
  <script src="reader.js"></script>
</body>
</html>
