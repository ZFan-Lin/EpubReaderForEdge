<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citron Reader</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #333;
    }
    
    .button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      text-decoration: none;
    }
    
    .button:hover {
      background: #106ebe;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>📚 Citron Reader</h2>
  <button class="button" id="openReader">Open Reader</button>
  <div class="info">
    <p>Click "Open Reader" to start reading EPUB files.</p>
    <p>You can also drag and drop EPUB files directly into the reader.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
